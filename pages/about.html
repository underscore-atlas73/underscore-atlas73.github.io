"\tEver since I was young, I've been captivated by STEM. Growing up around my uncle (who is an engineer in cybersecurity with machine learning) focused my interests on mathematics and software engineering. From mathematics sprouted my interests in physics and engineering; from software engineering sprouted my interests in electrical and computer engineering. I maintain many interests outside of STEM as well--philosophy, linguistics, and history to name a few, but these will most likely not be mentioned on this website.
\tIn addition to STEM, I have a long background in music. Starting with piano lessons at age 7 with my classically trained grandmother, music has provided a key anchorpoint and outlet for my life. Both the consumption and production of music are essential for maintaining my mental health and, by effect, my productivity.
\tThe purpose of this website is to act both as an online portfolio for future opportunities and as motivation for my projects. I feel sharing my ideas and progress will hopefully develop my self-drive and concentration, leading to me finally hacking away at that backlog of ideas..."
